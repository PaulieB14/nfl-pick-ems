name: Deploy to Netlify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Build for Netlify
      run: |
        echo "✅ Build completed successfully!"
        echo "📁 Output directory: ./out"
        echo "🚀 Deploy manually to Netlify or add credentials to enable auto-deploy"
        ls -la out/
